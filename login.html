<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大事件-登陆/注册</title>
    <!-- 2. 导入layui样式 -->
    <link rel="stylesheet" href="assets/lib/layui/css/layui.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <!-- 1. logo -->
    <!-- 3. 给包裹logo的div盒子添加layui-main类，是其作为版心 -->
    <div class="layui-main">
        <img src="assets/images/logo.png" alt="">
    </div>
    <!-- 4. 登陆注册 -->
    <div class="loginAndRegBox">
        <!-- 5. 登陆注册区域的标题 -->
        <div class="title-box"></div>
        <!-- 6. 登陆的div -->
        <div class="login-box">
            <!-- 18. 登陆的表单 -->
            <!-- 23. 在css中美化表单 -->
            <form class="layui-form" id="form_login">
                <!-- 用户名 -->
                <div class="layui-form-item">
                    <!-- 19. 删除输入框 -->
                    <!-- <label class="layui-form-label">输入框</label> -->
                    <!-- 20. 把input表单外围的div删除 -->
                    <!-- <div class="layui-input-block"> -->
                    <!-- 25. 更改name属性名和placeholder -->
                    <!-- 30. 添加表单左侧的小图标 -->
                    <!-- 31. 更改小图标类名，把layui-icon-face-smile更改为layui-icon-username -->
                    <!-- 32. 定位,让小图标处于input的正确位置(子绝父相) -->
                    <i class="layui-icon layui-icon-username"></i>
                    <input type="text" name="username" required lay-verify="required" placeholder="请输入用户名" autocomplete="off" class="layui-input">
                    <!-- </div> -->
                </div>

                <!-- 密码（复制用户名的代码） -->
                <div class="layui-form-item">
                    <!-- 19. 删除输入框 -->
                    <!-- <label class="layui-form-label">输入框</label> -->
                    <!-- 20. 把input表单外围的div删除 -->
                    <!-- <div class="layui-input-block"> -->
                    <!-- 26. 更改type属性，name属性名和placeholder -->
                    <!-- 30. 添加表单左侧的小图标 -->
                    <!-- 31. 更改小图标类名，把layui-icon-face-smile更改为layui-icon-password -->
                    <!-- 32. 定位,让小图标处于input的正确位置(子绝父相) -->
                    <i class="layui-icon layui-icon-password"></i>
                    <!-- 41. 增加自定义检验规则pwd -->
                    <input type="password" name="password" required lay-verify="required|pwd" placeholder="请输入密码" autocomplete="off" class="layui-input">
                    <!-- </div> -->
                </div>

                <!-- 登陆按钮 -->
                <div class="layui-form-item">
                    <!-- 21. 这里需要提交按钮，所以应该用提交按钮，同时把通栏按钮的类添加给提交按钮 -->
                    <!-- <button type="button" class="layui-btn layui-btn-fluid">流体按钮（最大化适应）</button> -->
                    <!-- 注意：表单提交按钮和普通按钮的区别，就是lay-submit属性（不是类） -->
                    <!-- 27. 修改按钮的名字和样式（添加类layui-btn-normal） -->
                    <button class="layui-btn layui-btn-fluid layui-btn-normal" lay-submit>登陆</button>
                </div>

                <!-- 22. 把a链接也放在form表单中，同时用<div class="layui-form-item"></div>包裹 -->
                <!-- 28. 添加类型links，是其右对齐 -->
                <div class="layui-form-item links">
                    <a href="javascript:;" id="link_reg">去注册账号</a>
                </div>
            </form>
            <!-- 8. 添加id -->
            <!-- <a href="javascript:;" id="link_reg">去注册账号</a> -->
        </div>
        <!-- 7. 注册的div -->
        <div class="reg-box">
            <!-- 35. 注册的表单 -->
            <form class="layui-form" id="form_reg">
                <!-- 用户名 -->
                <div class="layui-form-item">
                    <!-- 19. 删除输入框 -->
                    <!-- <label class="layui-form-label">输入框</label> -->
                    <!-- 20. 把input表单外围的div删除 -->
                    <!-- <div class="layui-input-block"> -->
                    <!-- 25. 更改name属性名和placeholder -->
                    <!-- 30. 添加表单左侧的小图标 -->
                    <!-- 31. 更改小图标类名，把layui-icon-face-smile更改为layui-icon-username -->
                    <!-- 32. 定位,让小图标处于input的正确位置(子绝父相) -->
                    <i class="layui-icon layui-icon-username"></i>
                    <input type="text" name="username" required lay-verify="required" placeholder="请输入用户名" autocomplete="off" class="layui-input">
                    <!-- </div> -->
                </div>

                <!-- 密码（复制用户名的代码） -->
                <div class="layui-form-item">
                    <!-- 19. 删除输入框 -->
                    <!-- <label class="layui-form-label">输入框</label> -->
                    <!-- 20. 把input表单外围的div删除 -->
                    <!-- <div class="layui-input-block"> -->
                    <!-- 26. 更改type属性，name属性名和placeholder -->
                    <!-- 30. 添加表单左侧的小图标 -->
                    <!-- 31. 更改小图标类名，把layui-icon-face-smile更改为layui-icon-password -->
                    <!-- 32. 定位,让小图标处于input的正确位置(子绝父相) -->
                    <i class="layui-icon layui-icon-password"></i>
                    <!-- 41. 增加自定义检验规则pwd -->
                    <input type="password" name="password" required lay-verify="required|pwd" placeholder="请输入密码" autocomplete="off" class="layui-input">
                    <!-- </div> -->
                </div>

                <!-- 36. 密码确认 -->
                <div class="layui-form-item">
                    <!-- 19. 删除输入框 -->
                    <!-- <label class="layui-form-label">输入框</label> -->
                    <!-- 20. 把input表单外围的div删除 -->
                    <!-- <div class="layui-input-block"> -->
                    <!-- 26. 更改type属性，name属性名和placeholder -->
                    <!-- 30. 添加表单左侧的小图标 -->
                    <!-- 31. 更改小图标类名，把layui-icon-face-smile更改为layui-icon-password -->
                    <!-- 32. 定位,让小图标处于input的正确位置(子绝父相) -->
                    <i class="layui-icon layui-icon-password"></i>
                    <!-- 37. 更改那么属性名（password->repassword），更改placeholder -->
                    <!-- 41. 增加自定义检验规则pwd -->
                    <!-- 44. 增加自定义检验规则repwd -->
                    <input type="password" name="repassword" required lay-verify="required|pwd|repwd" placeholder="再次确认密码" autocomplete="off" class="layui-input">
                    <!-- </div> -->
                </div>

                <!-- 注册按钮 -->
                <div class="layui-form-item">
                    <!-- 21. 这里需要提交按钮，所以应该用提交按钮，同时把通栏按钮的类添加给提交按钮 -->
                    <!-- <button type="button" class="layui-btn layui-btn-fluid">流体按钮（最大化适应）</button> -->
                    <!-- 注意：表单提交按钮和普通按钮的区别，就是lay-submit属性（不是类） -->
                    <!-- 27. 修改按钮的名字和样式（添加类layui-btn-normal） -->
                    <button class="layui-btn layui-btn-fluid layui-btn-normal" lay-submit>注册</button>
                </div>

                <!-- 22. 把a链接也放在form表单中，同时用<div class="layui-form-item"></div>包裹 -->
                <!-- 28. 添加类型links，是其右对齐 -->
                <div class="layui-form-item links">
                    <a href="javascript:;" id="link_login">去登陆</a>
                </div>
            </form>
            <!-- 9. 添加id -->
            <!-- <a href="javascript:;" id="link_login">去登陆</a> -->
        </div>
    </div>
    <!-- 38. 导入layui的js文件（因为表单验证(添加lay-verify属性)需要js文件） -->
    <script src="assets/lib/layui/layui.all.js"></script>
    <!-- 10. 导入jQuery -->
    <script src="assets/lib/jquery.js"></script>
    <!-- 53. 导入自己封装的baseAPI.js（只能在jQuery之后，login.js之前，因为需要使用$，我们自己的js文件需要使用baseAPI.js） -->
    <script src="assets/js/baseAPI.js"></script>
    <!-- 11. 导入自己的js -->
    <script src="assets/js/login.js"></script>
</body>

</html>
